<style>
  :root {
    --ice: #e8f4f8;
    --rink: #0a0f1e;
    --rink-mid: #111827;
    --rink-surface: #161f35;
    --red-line: #c8102e;
    --blue-line: #0057a8;
    --accent: #00bfff;
    --gold: #f5c842;
    --text: #e8f4f8;
    --text-dim: #7a9ab5;
    --border: rgba(0,191,255,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--rink);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(90deg, transparent, transparent 49.5%, rgba(0,87,168,0.07) 49.5%, rgba(0,87,168,0.07) 50.5%, transparent 50.5%),
      repeating-linear-gradient(0deg, transparent, transparent 49.5%, rgba(200,16,46,0.05) 49.5%, rgba(200,16,46,0.05) 50.5%, transparent 50.5%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  header { text-align: center; margin-bottom: 48px; }

  .logo-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 8px;
  }

  .puck {
    width: 28px; height: 14px;
    background: #222;
    border-radius: 50%;
    border: 2px solid #555;
    box-shadow: 0 2px 8px rgba(0,0,0,0.7);
  }

  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(2.4rem, 6vw, 4rem);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 60%, var(--blue-line) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .centre-line {
    height: 4px;
    background: var(--red-line);
    border-radius: 2px;
    margin: 32px 0;
    position: relative;
  }
  .centre-line::before {
    content: '';
    position: absolute;
    top: -3px; left: 50%; transform: translateX(-50%);
    width: 60px; height: 10px;
    background: var(--red-line);
    border-radius: 5px;
  }

  .card {
    background: var(--rink-surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 32px;
    margin-bottom: 20px;
  }

  .card-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 540px) {
    .fields { grid-template-columns: 1fr; }
    .card { padding: 20px; }
  }

  label {
    display: block;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  select, input[type="number"] {
    width: 100%;
    background: var(--rink-mid);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    padding: 10px 36px 10px 14px;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
  }

  input[type="number"] { padding-right: 14px; }

  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 1.1rem;
    pointer-events: none;
  }

  select:focus, input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,191,255,0.12);
  }

  select option {
    background: #111827;
    color: var(--text);
    font-size: 1rem;
  }

  input[type="number"]::-webkit-inner-spin-button { opacity: 0.4; }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 4px;
  }

  .toggle { position: relative; width: 48px; height: 26px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }

  .slider {
    position: absolute;
    inset: 0;
    background: var(--rink-mid);
    border: 1px solid var(--border);
    border-radius: 26px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .slider::before {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    left: 3px; top: 3px;
    background: var(--text-dim);
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle input:checked + .slider { background: var(--blue-line); border-color: var(--accent); }
  .toggle input:checked + .slider::before { transform: translateX(22px); background: #fff; }

  .toggle-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;

  .matchups-field { margin-top: 16px; display: none; }

<body>
<div class="container">

  <header>
    <div class="logo-line">
      <div class="puck"></div>
      <h1>NHL Team Picker</h1>
      <div class="puck"></div>
    </div>
    <p class="subtitle">Random matchups powered by real historical standings</p>
  </header>

  <div class="centre-line"></div>

  <div class="card">
    <div class="card-title">⚙️ &nbsp;Settings</div>
    <div class="fields">

      <div>
        <label for="gameSelect">EA NHL Game</label>
        <div class="select-wrap">
          <select id="gameSelect"></select>
        </div>
      </div>

      <div>
        <label for="numTeams">Teams Per Player</label>
        <input type="number" id="numTeams" min="1" max="10" value="1" />
      </div>

    </div>

    <div style="margin-top: 22px;">
      <label>Mode</label>
      <div class="toggle-row">
        <label class="toggle">
          <input type="checkbox" id="evenToggle" />
          <span class="slider"></span>
        </label>
        <span class="toggle-label">Even Matchups</span>
      </div>
      <div class="matchups-field" id="matchupsField">
        <label for="numMatchups" style="margin-top:16px;">Number of Matchups</label>
        <input type="number" id="numMatchups" min="1" max="10" value="1" />
      </div>
    </div>
  </div>

  <button class="btn-generate" id="generateBtn" onclick="generate()">
    Drop the Puck
  </button>

  <div id="status"></div>
  <div id="results"></div>

</div>

<script>
// ─── EA NHL game list ─────────────────────────────────────────────────────
// Each entry maps the EA game title to the NHL season start year it covers.
// e.g. NHL 97 ships in 1996 and covers the 1996-97 season → season: 1996
const EA_GAMES = [
  { label: "NHL Hockey ('91)",  season: 1990 },
  { label: "NHLPA '93",         season: 1992 },
  { label: "NHL '94",           season: 1993 },
  { label: "NHL 95",            season: 1994 },
  { label: "NHL 96",            season: 1995 },
  { label: "NHL 97",            season: 1996 },
  { label: "NHL 98",            season: 1997 },
  { label: "NHL 99",            season: 1998 },
  { label: "NHL 2000",          season: 1999 },
  { label: "NHL 2001",          season: 2000 },
  { label: "NHL 2002",          season: 2001 },
  { label: "NHL 2003",          season: 2002 },
  { label: "NHL 2004",          season: 2003 },
  // 2004-05 season cancelled (lockout) — no NHL 2005
  { label: "NHL 06",            season: 2005 },
  { label: "NHL 07",            season: 2006 },
  { label: "NHL 08",            season: 2007 },
  { label: "NHL 09",            season: 2008 },
  { label: "NHL 10",            season: 2009 },
  { label: "NHL 11",            season: 2010 },
  { label: "NHL 12",            season: 2011 },
  { label: "NHL 13",            season: 2012 },
  { label: "NHL 14",            season: 2013 },
  { label: "NHL 15",            season: 2014 },
  { label: "NHL 16",            season: 2015 },
  { label: "NHL 17",            season: 2016 },
  { label: "NHL 18",            season: 2017 },
  { label: "NHL 19",            season: 2018 },
  { label: "NHL 20",            season: 2019 },
  { label: "NHL 21",            season: 2020 },
  { label: "NHL 22",            season: 2021 },
  { label: "NHL 23",            season: 2022 },
  { label: "NHL 24",            season: 2023 },
  { label: "NHL 25",            season: 2024 },
  { label: "NHL 26",            season: 2025 },
];

// ─── Team franchise history ───────────────────────────────────────────────
// from/until = season START year. until is inclusive last season.
const TEAM_HISTORY = {
  1:  { name: "New Jersey Devils",       from: 1982 },
  2:  { name: "New York Islanders",      from: 1972 },
  3:  { name: "New York Rangers",        from: 1926 },
  4:  { name: "Philadelphia Flyers",     from: 1967 },
  5:  { name: "Pittsburgh Penguins",     from: 1967 },
  6:  { name: "Boston Bruins",           from: 1924 },
  7:  { name: "Buffalo Sabres",          from: 1970 },
  8:  { name: "Montreal Canadiens",      from: 1917 },
  9:  { name: "Ottawa Senators",         from: 1992 },
  10: { name: "Toronto Maple Leafs",     from: 1917 },
  12: { name: "Carolina Hurricanes",     from: 1997 },
  13: { name: "Florida Panthers",        from: 1993 },
  14: { name: "Tampa Bay Lightning",     from: 1992 },
  15: { name: "Washington Capitals",     from: 1974 },
  16: { name: "Chicago Blackhawks",      from: 1926 },
  17: { name: "Detroit Red Wings",       from: 1926 },
  18: { name: "Nashville Predators",     from: 1998 },
  19: { name: "St. Louis Blues",         from: 1967 },
  20: { name: "Calgary Flames",          from: 1980 },
  21: { name: "Colorado Avalanche",      from: 1995 },
  22: { name: "Edmonton Oilers",         from: 1979 },
  23: { name: "Vancouver Canucks",       from: 1970 },
  24: { name: "Anaheim Ducks",           from: 1993 },
  25: { name: "Dallas Stars",            from: 1993 },
  26: { name: "Los Angeles Kings",       from: 1967 },
  28: { name: "San Jose Sharks",         from: 1991 },
  29: { name: "Columbus Blue Jackets",   from: 2000 },
  30: { name: "Minnesota Wild",          from: 2000 },
  52: { name: "Winnipeg Jets",           from: 2011 },
  53: { name: "Arizona Coyotes",         from: 1996, until: 2023 },
  54: { name: "Vegas Golden Knights",    from: 2017 },
  55: { name: "Seattle Kraken",          from: 2021 },
  56: { name: "Utah Hockey Club",        from: 2024 },
  // Legacy / relocated franchises
  900: { name: "Hartford Whalers",        from: 1972, until: 1996 },
  901: { name: "Quebec Nordiques",        from: 1979, until: 1994 },
  902: { name: "Minnesota North Stars",   from: 1967, until: 1992 },
  903: { name: "Atlanta Thrashers",       from: 1999, until: 2010 },
  904: { name: "Winnipeg Jets (orig.)",   from: 1979, until: 1995 },
};

// ─── Build dropdown (most recent first, default to NHL 97) ─────────────
(function buildDropdown() {
  const sel = document.getElementById('gameSelect');
  [...EA_GAMES].reverse().forEach(g => {
    const opt = document.createElement('option');
    opt.value = g.season;
    opt.textContent = g.label;
    if (g.label === "NHL 97") opt.selected = true;
    sel.appendChild(opt);
  });
})();

// ─── Filter teams valid for a given season start year ─────────────────
function teamsForSeason(seasonYear) {
  return Object.entries(TEAM_HISTORY)
    .filter(([, t]) => seasonYear >= t.from && seasonYear <= (t.until ?? 9999))
    .map(([id, t]) => ({ id: parseInt(id), name: t.name }));
}

// ─── NHL API v1 standings ─────────────────────────────────────────────
async function fetchStandings(seasonYear) {
  const endYear = seasonYear + 1;

  // Strategy: try a date near end of regular season.
  // For current or future seasons, use /standings/now.
  // For past seasons, use /standings/YYYY-MM-DD (April 10 of the end year).
  const TODAY_SEASON = 2024; // 2024-25 is the current season as of app build
  let urls;

  if (seasonYear >= TODAY_SEASON) {
    urls = ['https://api-web.nhle.com/v1/standings/now'];
  } else {
    const april10 = `${endYear}-04-10`;
    const april05 = `${endYear}-04-05`;
    const april15 = `${endYear}-04-15`;
    urls = [
      `https://api-web.nhle.com/v1/standings/${april10}`,
      `https://api-web.nhle.com/v1/standings/${april05}`,
      `https://api-web.nhle.com/v1/standings/${april15}`,
    ];
  }

  let lastErr;
  for (const url of urls) {
    try {
      const res = await fetch(`https://corsproxy.io/?url=${encodeURIComponent(url)}`);
      if (!res.ok) { lastErr = new Error(`HTTP ${res.status}`); continue; }
      const data = await res.json();
      const standings = data.standings;
      if (standings && standings.length > 0) return standings;
    } catch (e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error('Could not load standings. The NHL API may not have data for this season.');
}

// ─── Parse standings into a lookup map ───────────────────────────────
function parseStandings(standings) {
  const sorted = [...standings].sort((a, b) => (b.points || 0) - (a.points || 0));
  const map = {};

  sorted.forEach((team, i) => {
    const city   = (team.placeName?.default || team.teamCity?.default || '').toLowerCase();
    const common = (team.teamName?.default || team.teamCommonName?.default || '').toLowerCase();
    const abbrev = (team.teamAbbrev?.default || '').toLowerCase();
    const gp  = team.gamesPlayed || 1;
    const pts = team.points || 0;

    const entry = {
      pts,
      gamesPlayed: gp,
      ptsPercent: pts / (gp * 2),
      rank: i + 1,
      abbrev: team.teamAbbrev?.default || ''
    };

    if (city)   map[city]             = entry;
    if (common) map[common]           = entry;
    if (abbrev) map[abbrev]           = entry;
    if (city && common) map[`${city} ${common}`] = entry;
  });

  return map;
}

// ─── Match our team list to standings ────────────────────────────────
function matchTeamsToStandings(teams, standingsMap) {
  return teams.map(t => {
    const lower = t.name.toLowerCase();
    const words = lower.split(' ');

    // 1. Exact full name
    let data = standingsMap[lower];

    // 2. Last word (nickname): "Bruins", "Flyers", etc.
    if (!data) data = standingsMap[words[words.length - 1]];

    // 3. Second-to-last word (for "Maple Leafs" → "leafs")
    if (!data && words.length >= 2) data = standingsMap[words[words.length - 2]];

    // 4. Partial key scan — find any key that includes the nickname
    if (!data) {
      const nick = words[words.length - 1];
      const key = Object.keys(standingsMap).find(k => k.includes(nick));
      if (key) data = standingsMap[key];
    }

    return {
      ...t,
      pts:        data?.pts        ?? 0,
      gamesPlayed:data?.gamesPlayed ?? 82,
      ptsPercent: data?.ptsPercent  ?? 0,
      rank:       data?.rank        ?? 99,
      found: !!data
    };
  });
}

// ─── Pick helpers ─────────────────────────────────────────────────────
function pickRandom(arr, n) {
  const pool = [...arr];
  const picked = [];
  for (let i = 0; i < Math.min(n, pool.length); i++) {
    const idx = Math.floor(Math.random() * pool.length);
    picked.push(pool.splice(idx, 1)[0]);
  }
  return picked;
}

function pickEvenMatchups(teams, numMatchups) {
  const sorted = [...teams].sort((a, b) => b.ptsPercent - a.ptsPercent);
  
  // Split into thirds (top, mid, bottom)
  const tierSize = Math.ceil(sorted.length / 3);
  const tiers = [
    sorted.slice(0, tierSize),
    sorted.slice(tierSize, tierSize * 2),
    sorted.slice(tierSize * 2)
  ];

  // Shuffle each tier
  tiers.forEach(tier => {
    for (let i = tier.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [tier[i], tier[j]] = [tier[j], tier[i]];
    }
  });

  // Pull pairs from randomly selected tiers
  const matchups = [];
  const used = new Set();

  while (matchups.length < numMatchups) {
    // Pick a random tier that has at least 2 unused teams
    const validTiers = tiers.filter(tier =>
      tier.filter(t => !used.has(t.name)).length >= 2
    );
    if (!validTiers.length) break;

    const tier = validTiers[Math.floor(Math.random() * validTiers.length)];
    const available = tier.filter(t => !used.has(t.name));
    const a = available[Math.floor(Math.random() * available.length)];
    const remaining = available.filter(t => t.name !== a.name);
    const b = remaining[Math.floor(Math.random() * remaining.length)];

    used.add(a.name);
    used.add(b.name);
    matchups.push([a, b]);
  }

  return matchups;
}

// ─── Render results ───────────────────────────────────────────────────
function renderResults(seasonYear, teams, evenMode, matchups) {
  const el = document.getElementById('results');
  el.innerHTML = '';

  const badge = document.createElement('div');
  badge.className = 'season-badge';
  badge.textContent = `${seasonYear}–${String(seasonYear + 1).slice(-2)} NHL Season`;
  el.appendChild(badge);

  if (evenMode) {
    matchups.forEach((pair, mi) => {
      const div = document.createElement('div');
      div.className = 'matchup';
      div.style.animationDelay = `${mi * 0.08}s`;
      div.innerHTML = `
        <div class="team-block">
          <div class="team-name">${pair[0].name}</div>
          <div class="team-pts">Rank <span>#${pair[0].rank}</span> &middot; <span>${pair[0].pts}</span> pts</div>
        </div>
        <div class="vs">VS</div>
        <div class="team-block">
          <div class="team-name">${pair[1].name}</div>
          <div class="team-pts">Rank <span>#${pair[1].rank}</span> &middot; <span>${pair[1].pts}</span> pts</div>
        </div>`;
      el.appendChild(div);
    });
  } else {
    const perPlayer = Math.ceil(teams.length / 2);
    for (let p = 0; p < 2; p++) {
      const slice = teams.slice(p * perPlayer, (p + 1) * perPlayer);
      if (!slice.length) continue;
      const section = document.createElement('div');
      section.className = 'player-section';
      section.innerHTML = `<div class="player-label">Player ${p + 1}</div>`;
      slice.forEach((t, ti) => {
        const pill = document.createElement('div');
        pill.className = 'team-pill';
        pill.style.animationDelay = `${(p * perPlayer + ti) * 0.07}s`;
        pill.innerHTML = `
          <span class="pill-name">${t.name}</span>
          <span class="pill-rank">Rank <span>#${t.rank}</span> &middot; <span>${t.pts}</span> pts</span>`;
        section.appendChild(pill);
      });
      el.appendChild(section);
      if (p === 0) {
        const line = document.createElement('div');
        line.className = 'blue-line';
        el.appendChild(line);
      }
    }
  }
}

// ─── Main ─────────────────────────────────────────────────────────────
async function generate() {
  const seasonYear  = parseInt(document.getElementById('gameSelect').value);
  const numTeams    = parseInt(document.getElementById('numTeams').value);
  const evenMode    = document.getElementById('evenToggle').checked;
  const numMatchups = evenMode ? parseInt(document.getElementById('numMatchups').value) : 1;

  const btn     = document.getElementById('generateBtn');
  const status  = document.getElementById('status');
  const results = document.getElementById('results');

  btn.disabled = true;
  status.innerHTML = '<span class="spinner"></span> Fetching standings…';
  status.className = 'loading';
  results.innerHTML = '';

  try {
    const raw          = await fetchStandings(seasonYear);
    const standingsMap = parseStandings(raw);
    const validTeams   = teamsForSeason(seasonYear);

    if (!validTeams.length) throw new Error(`No NHL teams found for the ${seasonYear}–${seasonYear+1} season.`);

    const withData   = matchTeamsToStandings(validTeams, standingsMap);
    const knownTeams = withData.filter(t => t.found);

    if (knownTeams.length < 4) throw new Error(`Only matched ${knownTeams.length} teams — API may not have data for this season yet.`);

    if (evenMode) {
      const needed = numMatchups * 2;
      if (knownTeams.length < needed) throw new Error(`Need ${needed} teams for ${numMatchups} matchup(s), only ${knownTeams.length} available.`);
      const matchups = pickEvenMatchups(knownTeams, numMatchups);
      status.textContent = `${matchups.length} even matchup${matchups.length !== 1 ? 's' : ''} generated`;
      status.className = '';
      renderResults(seasonYear, [], true, matchups);
    } else {
      const needed = numTeams * 2;
      if (knownTeams.length < needed) throw new Error(`Only ${knownTeams.length} teams available — reduce teams per player.`);
      const picked = pickRandom(knownTeams, needed);
      status.textContent = `${numTeams} team${numTeams !== 1 ? 's' : ''} per player  ·  ${knownTeams.length} teams in pool`;
      status.className = '';
      renderResults(seasonYear, picked, false, []);
    }

  } catch (err) {
    status.textContent = err.message || 'Something went wrong. Try a different game.';
    status.className = 'error';
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('evenToggle').addEventListener('change', function () {
  document.getElementById('matchupsField').classList.toggle('visible', this.checked);
});

document.addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });
</script>
